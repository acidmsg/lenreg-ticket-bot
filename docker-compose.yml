services:
  # ===========================================================================
  # Redis — FSM-хранилище и кэш
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: zdrav_redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - zdrav_network

  # ===========================================================================
  # Qdrant — векторное хранилище для Codebase Indexing
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: zdrav_qdrant
    ports:
      - "127.0.0.1:6333:6333"   # HTTP API
      - "127.0.0.1:6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - zdrav_network

  # ===========================================================================
  # Bot — Telegram-бот (aiogram polling)
  # ===========================================================================
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zdrav_bot
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    volumes:
      - bot_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python -m src.main' > /dev/null 2>&1 && redis-cli -h redis ping > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    ports:
      - "127.0.0.1:9090:9090"
      # Mini App / веб-дашборд — открыт для Cloudflare Proxy (порт 8080)
      - "0.0.0.0:8080:8080"
    networks:
      - zdrav_network

volumes:
  redis_data:
    driver: local
  bot_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  zdrav_network:
    driver: bridge
