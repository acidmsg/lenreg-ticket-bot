services:
  # ===========================================================================
  # Redis — FSM-хранилище и кэш
  # ===========================================================================
  redis:
    image: redis:7.2-alpine
    container_name: lenreg_ticket_redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy volatile-lru --requirepass ${REDIS_PASSWORD}
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '$${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lenreg_ticket_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ===========================================================================
  # Qdrant — векторное хранилище для Codebase Indexing
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: lenreg_ticket_qdrant
    ports:
      - '127.0.0.1:6333:6333' # HTTP API
      - '127.0.0.1:6334:6334' # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - lenreg_ticket_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ===========================================================================
  # Bot — Telegram-бот (aiogram polling)
  # ===========================================================================
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lenreg_ticket_bot
    restart: unless-stopped
    user: '1000:1000'
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./scripts:/app/scripts:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "pgrep -f 'python -m src.main' > /dev/null 2>&1 && redis-cli -h redis -a $${REDIS_PASSWORD} ping > /dev/null 2>&1 || exit 1"
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    ports:
      - '127.0.0.1:9090:9090'
      # Веб-дашборд: доступен снаружи через Cloudflare (Origin Rule: 8080).
      - '8080:8080'
    networks:
      - lenreg_ticket_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  redis_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  lenreg_ticket_network:
    driver: bridge
