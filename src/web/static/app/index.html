<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="app-version" content="3" />
    <title>Мониторинг врачей</title>
    <link rel="stylesheet" href="/static/app/vendor/vanilla-calendar.min.css" />
    <link rel="stylesheet" href="css/style.css?v=3" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function () {
        function applyTheme(scheme) {
          document.documentElement.dataset.theme = scheme || 'dark';
        }
        // Telegram Mini App
        if (window.Telegram && window.Telegram.WebApp) {
          applyTheme(window.Telegram.WebApp.colorScheme);
          window.Telegram.WebApp.onEvent('themeChanged', function () {
            applyTheme(window.Telegram.WebApp.colorScheme);
          });
        }
      })();
    </script>
    <script src="/static/app/vendor/vanilla-calendar.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script src="/static/app/js/utils/escape.js"></script>
    <script src="/static/app/js/utils/doctor.js"></script>
    <script src="/static/app/js/utils/dom.js"></script>
    <script src="/static/app/js/utils/monitoring.js"></script>
    <script src="/static/app/js/utils/ui.js"></script>
    <script type="module" src="js/app.js?v=3"></script>
  </body>
</html>
