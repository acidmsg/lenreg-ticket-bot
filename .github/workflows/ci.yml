name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: poetry.lock

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1
          virtualenvs-create: false

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi --with dev

      - name: Compile translations
        run: |
          python -m babel.messages.frontend compile -d locales -D bot
          python -m babel.messages.frontend compile -d locales -D data

      - name: Lint with Ruff
        run: ruff check src

      - name: Check Python formatting (ruff)
        run: python -m ruff format --check src/ tests/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint Markdown
        run: npx markdownlint "specs/**/*.md" ".roo/**/*.md" "*.md"

      - name: Check formatting (Prettier)
        run: npx prettier --check "specs/**/*.md" ".roo/**/*.md" "*.md"

      - name: Build Docker image
        run: docker build -t zdrav-bot .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: poetry.lock

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1
          virtualenvs-create: false

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi --with dev

      - name: Compile translations
        run: |
          python -m babel.messages.frontend compile -d locales -D bot
          python -m babel.messages.frontend compile -d locales -D data

      - name: Type check with Mypy
        run: mypy --ignore-missing-imports --check-untyped-defs --explicit-package-bases -p src -p scripts -p tests

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: poetry.lock

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1
          virtualenvs-create: false

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi --with dev

      - name: Compile translations
        run: |
          python -m babel.messages.frontend compile -d locales -D bot
          python -m babel.messages.frontend compile -d locales -D data

      - name: Run tests with pytest
        run: pytest
        env:
          CI: true
