<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вариант 1 — Accent-граница</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      /*
     * Вариант 1: Accent-граница (border)
     * Выбранная дата — accent-граница + лёгкий accent-фон.
     * Сегодня — тонкая граница цвета border.
     */

      /* === Выбранная дата === */
      .calendar__day--selected {
        border: 2px solid var(--color-accent);
        color: var(--color-accent);
        background: rgb(9 182 83 / 10%); /* accent 10% */
        font-weight: var(--font-weight-semibold);
      }

      /* === Сегодня === */
      .calendar__day--today {
        border: 1px solid var(--color-border);
        color: var(--color-text-primary);
      }

      /* === Hover === */
      .calendar__day:not(.calendar__day--other-month):hover {
        border-color: var(--color-accent);
        background: rgb(9 182 83 / 8%);
      }

      .calendar__day--selected:hover {
        background: rgb(9 182 83 / 16%);
      }

      /* === Легенда === */
      .legend-selected {
        background: transparent;
        border: 2px solid var(--color-accent);
      }
      .legend-today {
        background: transparent;
        border: 1px solid var(--color-border);
      }
    </style>
  </head>
  <body>
    <div class="calendar">
      <!-- Заголовок -->
      <div class="calendar__header">
        <button class="calendar__nav"><</button>
        <span class="calendar__title">Июнь 2026</span>
        <button class="calendar__nav">></button>
      </div>

      <!-- Дни недели -->
      <div class="calendar__weekdays">
        <span class="calendar__weekday">Пн</span>
        <span class="calendar__weekday">Вт</span>
        <span class="calendar__weekday">Ср</span>
        <span class="calendar__weekday">Чт</span>
        <span class="calendar__weekday">Пт</span>
        <span class="calendar__weekday">Сб</span>
        <span class="calendar__weekday">Вс</span>
      </div>

      <!-- Сетка дней -->
      <div class="calendar__grid">
        <!-- Ряд 1: 28-31 мая + 1-3 июня -->
        <span class="calendar__day calendar__day--other-month">28</span>
        <span class="calendar__day calendar__day--other-month">29</span>
        <span class="calendar__day calendar__day--other-month">30</span>
        <span class="calendar__day calendar__day--other-month">31</span>
        <span class="calendar__day">1</span>
        <span class="calendar__day">2</span>
        <span class="calendar__day">3</span>

        <!-- Ряд 2: 4-10 июня -->
        <span class="calendar__day">4</span>
        <span class="calendar__day">5</span>
        <span class="calendar__day">6</span>
        <span class="calendar__day">7</span>
        <span class="calendar__day">8</span>
        <span class="calendar__day">9</span>
        <span class="calendar__day">10</span>

        <!-- Ряд 3: 11-17 июня -->
        <span class="calendar__day">11</span>
        <span class="calendar__day">12</span>
        <span class="calendar__day">13</span>
        <span class="calendar__day">14</span>
        <span class="calendar__day calendar__day--today">15</span>
        <span class="calendar__day calendar__day--selected">16</span>
        <span class="calendar__day">17</span>

        <!-- Ряд 4: 18-24 июня -->
        <span class="calendar__day">18</span>
        <span class="calendar__day">19</span>
        <span class="calendar__day">20</span>
        <span class="calendar__day">21</span>
        <span class="calendar__day">22</span>
        <span class="calendar__day">23</span>
        <span class="calendar__day">24</span>

        <!-- Ряд 5: 25-30 июня + 1 июля -->
        <span class="calendar__day">25</span>
        <span class="calendar__day">26</span>
        <span class="calendar__day">27</span>
        <span class="calendar__day">28</span>
        <span class="calendar__day">29</span>
        <span class="calendar__day">30</span>
        <span class="calendar__day calendar__day--other-month">1</span>

        <!-- Ряд 6: 2-8 июля -->
        <span class="calendar__day calendar__day--other-month">2</span>
        <span class="calendar__day calendar__day--other-month">3</span>
        <span class="calendar__day calendar__day--other-month">4</span>
        <span class="calendar__day calendar__day--other-month">5</span>
        <span class="calendar__day calendar__day--other-month">6</span>
        <span class="calendar__day calendar__day--other-month">7</span>
        <span class="calendar__day calendar__day--other-month">8</span>
      </div>

      <!-- Легенда -->
      <div class="calendar__legend">
        <div class="calendar__legend-item">
          <span class="calendar__legend-dot legend-selected"></span>
          Выбрано
        </div>
        <div class="calendar__legend-item">
          <span class="calendar__legend-dot legend-today"></span>
          Сегодня
        </div>
      </div>
    </div>
  </body>
</html>
